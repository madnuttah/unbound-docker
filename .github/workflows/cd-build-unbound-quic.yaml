name: CD Build Distroless Unbound QUIC Docker Image

on:
  workflow_run:
    workflows: [CD Build Distroless Unbound Docker Image]
    types:
      - completed
  workflow_dispatch:

permissions: {}

jobs:
  buildvars:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: ${{ steps.SET_DATE.outputs.IMAGE_BUILD_DATE }}
      UNBOUND_DOCKER_IMAGE_VERSION: ${{ steps.IMPORT_BUILDVARS.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}
      UNBOUND_VERSION: ${{ steps.IMPORT_BUILDVARS.outputs.UNBOUND_VERSION }}
      UNBOUND_SHA256: ${{ steps.IMPORT_BUILDVARS.outputs.UNBOUND_SHA256 }}
      NGTCP2_VERSION: ${{ steps.IMPORT_BUILDVARS.outputs.NGTCP2_VERSION }}
      OPENSSL_QUIC_BUILDENV_VERSION: ${{ steps.IMPORT_BUILDVARS.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set IMAGE_BUILD_DATE
        id: SET_DATE
        run: echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Import build variables from buildvars file
        id: IMPORT_BUILDVARS
        run: |
          cat buildvars | grep UNBOUND_VERSION >> $GITHUB_OUTPUT
          cat buildvars | grep UNBOUND_SHA256 >> $GITHUB_OUTPUT
          cat buildvars | grep UNBOUND_DOCKER_IMAGE_VERSION >> $GITHUB_OUTPUT
          cat buildvars | grep NGTCP2_VERSION >> $GITHUB_OUTPUT
          cat buildvars | grep OPENSSL_QUIC_BUILDENV_VERSION >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: buildvars
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push QUIC image
        uses: docker/build-push-action@v7
        env:
          DOCKERHUB_SLUG: "madnuttah/unbound"
        with:
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v6,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}
            OPENSSL_QUIC_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}
            NGTCP2_VERSION=${{ needs.buildvars.outputs.NGTCP2_VERSION }}
          file: ./unbound/release_quic.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          cache-from: type=registry,ref=madnuttah/unbound:buildcache
          cache-to: type=registry,ref=madnuttah/unbound:buildcache,mode=max
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}-quic
            ${{ env.DOCKERHUB_SLUG }}:latest-quic

  update_release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update release with QUIC result
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          UNBOUND_VERSION="$(grep '^UNBOUND_VERSION=' buildvars | cut -d'=' -f2-)"
          RELEASE_TAG="v${UNBOUND_VERSION}-0"
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          BODY=$(gh release view "$RELEASE_TAG" --json body -q .body)
          if [ "${{ needs.build.result }}" = "success" ]; then
            NEW_LINE="* Updated Unbound and Unbound+QUIC to version ${UNBOUND_VERSION}"
          else
            NEW_LINE="* Updated Unbound to version ${UNBOUND_VERSION}\n* Unbound+QUIC build failed or was not available for this release"
          fi
          UPDATED_BODY=$(echo "$BODY" | sed "s|Unbound+QUIC build is currently building…|$NEW_LINE|")
          gh release edit "$RELEASE_TAG" --notes "$UPDATED_BODY"
