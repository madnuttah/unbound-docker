name: CD Build Unbound QUIC Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "versions/unbound.txt"
      - "versions/openssl-quic-buildenv.txt"
  workflow_dispatch:

concurrency:
  group: cd-build-unbound-quic
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:

  buildvars:
    if: success() && (github.actor == 'renovate[bot]' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"
      UNBOUND_SHA256: "${{ steps.vars.outputs.UNBOUND_SHA256 }}"
      OPENSSL_QUIC_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}"
      UNBOUND_QUIC_IMAGE_VERSION: "${{ steps.vars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            nlnetlabs.nl:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Load versions and fetch SHA256
        id: vars
        run: |
          set -euo pipefail

          UNBOUND_VERSION="$(cat versions/unbound.txt)"

          SHA_URL="https://nlnetlabs.nl/downloads/unbound/unbound-${UNBOUND_VERSION}.tar.gz.sha256"
          if ! curl --fail -sL "$SHA_URL" >/dev/null; then
            printf "ERROR: SHA256 file not found for %s\n" "$UNBOUND_VERSION" >&2
            exit 1
          fi

          UNBOUND_SHA256="$(curl -sL "$SHA_URL" | awk '{print $1}')"

          OPENSSL_QUIC_BUILDENV_VERSION="$(grep '^OPENSSL_QUIC_BUILDENV_VERSION=' versions/openssl-quic-buildenv.txt | cut -d= -f2)"

          UNBOUND_SUB="$(
            sed -n 's/^unbound=[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}-\([0-9]\+\)\(-quic\)\?$/\1/p' \
              versions/unbound-quic-docker-image.txt
          )"
          
          UNBOUND_QUIC_IMAGE_VERSION="${UNBOUND_VERSION}-${UNBOUND_SUB}-quic"

          {
            echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "UNBOUND_VERSION=${UNBOUND_VERSION}"
            echo "UNBOUND_SHA256=${UNBOUND_SHA256}"
            echo "OPENSSL_QUIC_BUILDENV_VERSION=${OPENSSL_QUIC_BUILDENV_VERSION}"
            echo "UNBOUND_QUIC_IMAGE_VERSION=${UNBOUND_QUIC_IMAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Show build variables
        run: |
          echo "IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
          echo "UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}"
          echo "UNBOUND_SHA256=${{ steps.vars.outputs.UNBOUND_SHA256 }}"
          echo "OPENSSL_QUIC_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}"
          echo "UNBOUND_QUIC_IMAGE_VERSION=${{ steps.vars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}"

  build:
    if: github.actor == 'renovate[bot]' || github.event_name == 'workflow_dispatch'
    needs: buildvars
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: 386
            platform: linux/386
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x
          - arch: riscv64
            platform: linux/riscv64

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            dl-cdn.alpinelinux.org:443
            github.com:443
            keyserver.ubuntu.com:443
            nlnetlabs.nl:443
            pgp.surf.nl:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443
            www.internic.net:443
            www.nlnetlabs.nl:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push QUIC arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: "unbound/release_quic.Dockerfile"

          platforms: ${{ matrix.platform }}
          push: true

          sbom: false
          provenance: false

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}
            OPENSSL_QUIC_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-quic-${{ matrix.arch }}

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-quic-${{ matrix.arch }},mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}-${{ matrix.arch }}

  upload-pipeline-metadata:
    needs: [buildvars, build]
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >+
          
      - name: Create Isolated Metadata
        run: |
          mkdir -p metadata-payload
          printf "%s" "${{ needs.buildvars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}" > metadata-payload/version.txt
          printf "stable-quic" > metadata-payload/variant.txt

      - name: Upload Metadata Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unbound-build-metadata
          path: metadata-payload/
          retention-days: 1
