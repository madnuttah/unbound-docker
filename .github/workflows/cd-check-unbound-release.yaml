name: CD Check NLnet Labs Unbound Release

on:
  schedule:
    - cron: "0 12-17 * * mon-fri"

permissions: {}

jobs:
  unbound-update:
    runs-on: ubuntu-latest

    steps:
      - name: Get versions
        id: GET_VERSIONS
        run: |
          BOOL="$(curl -s https://api.github.com/repos/NLnetLabs/unbound/releases | jq '.[0] | .prerelease')"
          if $BOOL; then
            echo "Pre-release, skipping"
            exit 1
          fi

          UNBOUND_VERSION="$(curl -s https://api.github.com/repos/NLnetLabs/unbound/releases | jq -r '.[0].name' | grep -Eo '([0-9]+)(\.?[0-9]+)*' | head -1)"
          echo "UNBOUND_VERSION=$UNBOUND_VERSION" >> $GITHUB_OUTPUT

          UNBOUND_DOCKER_VERSION="$(curl -s https://api.github.com/repos/madnuttah/unbound-docker/releases | jq -r '.[0].name' | grep -Eo '([0-9]+)(\.?[0-9]+)*' | head -1)"
          echo "UNBOUND_DOCKER_VERSION=$UNBOUND_DOCKER_VERSION" >> $GITHUB_OUTPUT

          UNBOUND_DOCKER_IMAGE_VERSION="$(curl -s https://api.github.com/repos/madnuttah/unbound-docker/releases | jq -r '.[0].name')"
          echo "UNBOUND_DOCKER_IMAGE_VERSION=$UNBOUND_DOCKER_IMAGE_VERSION" >> $GITHUB_OUTPUT

          RELEASES=$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases | jq -r '.[].tag_name')
          OPENSSL_BUILDENV_VERSION=$(echo "$RELEASES" | grep -vi quic | head -n 1)
          OPENSSL_BUILDENV_VERSION=${OPENSSL_BUILDENV_VERSION#openssl-}
          echo "OPENSSL_BUILDENV_VERSION=$OPENSSL_BUILDENV_VERSION" >> $GITHUB_OUTPUT

          NGTCP2_VERSION=$(curl -s https://api.github.com/repos/ngtcp2/ngtcp2/releases | jq -r '.[0].tag_name')
          echo "NGTCP2_VERSION=$NGTCP2_VERSION" >> $GITHUB_OUTPUT

          NGHTTP3_VERSION=$(curl -s https://api.github.com/repos/ngtcp2/nghttp3/releases | jq -r '.[0].tag_name')
          echo "NGHTTP3_VERSION=$NGHTTP3_VERSION" >> $GITHUB_OUTPUT

      - name: Is update available
        id: IS_UPDATE_AVAILABLE
        run: |
          if [[ "${STEPS_GET_VERSIONS_OUTPUTS_UNBOUND_VERSION}" = "${STEPS_GET_VERSIONS_OUTPUTS_UNBOUND_DOCKER_VERSION}" ]]; then
            echo "No update found"
            exit 1
          fi

          echo "Update found"
          echo UNBOUND_SHA256="$(curl -s https://nlnetlabs.nl/downloads/unbound/unbound-${STEPS_GET_VERSIONS_OUTPUTS_UNBOUND_VERSION}.tar.gz.sha256)" >> $GITHUB_OUTPUT
          echo UNBOUND_GIT_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git | head -1 | cut -f 1)" >> $GITHUB_OUTPUT
        env:
          STEPS_GET_VERSIONS_OUTPUTS_UNBOUND_VERSION: ${{ steps.GET_VERSIONS.outputs.UNBOUND_VERSION }}
          STEPS_GET_VERSIONS_OUTPUTS_UNBOUND_DOCKER_VERSION: ${{ steps.GET_VERSIONS.outputs.UNBOUND_DOCKER_VERSION }}

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5

      - name: Push files to repository
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          UNBOUND_VERSION: ${{ steps.GET_VERSIONS.outputs.UNBOUND_VERSION }}
          UNBOUND_SHA256: ${{ steps.IS_UPDATE_AVAILABLE.outputs.UNBOUND_SHA256 }}
          UNBOUND_GIT_SHA: ${{ steps.IS_UPDATE_AVAILABLE.outputs.UNBOUND_GIT_SHA }}
          OPENSSL_BUILDENV_VERSION: ${{ steps.GET_VERSIONS.outputs.OPENSSL_BUILDENV_VERSION }}
          NGTCP2_VERSION: ${{ steps.GET_VERSIONS.outputs.NGTCP2_VERSION }}
          NGHTTP3_VERSION: ${{ steps.GET_VERSIONS.outputs.NGHTTP3_VERSION }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          echo IMAGE_BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > buildvars
          echo UNBOUND_VERSION="$UNBOUND_VERSION" >> buildvars
          echo UNBOUND_SHA256="$UNBOUND_SHA256" >> buildvars
          echo UNBOUND_DOCKER_IMAGE_VERSION="${UNBOUND_VERSION}-0" >> buildvars
          echo OPENSSL_BUILDENV_VERSION="$OPENSSL_BUILDENV_VERSION" >> buildvars
          echo NGTCP2_VERSION="$NGTCP2_VERSION" >> buildvars
          echo NGHTTP3_VERSION="$NGHTTP3_VERSION" >> buildvars

          echo "$UNBOUND_GIT_SHA" > unbound_git_sha

          git add buildvars unbound_git_sha
          git commit -m "Updated buildvars and unbound_git_sha"
          git push origin main
          exit 0
