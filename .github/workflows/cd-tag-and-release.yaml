name: CD Tag And Release

on:
  workflow_run:
    workflows:
      - "CD Publish Unbound Manifests"
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            raw.githubusercontent.com:443

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          
      - name: Download metadata artifact natively
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-build-metadata
          path: metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          
      - name: Show metadata used for this run
        run: |
          echo "=== METADATA DEBUG ==="
          echo "Triggered by workflow run: ${{ github.event.workflow_run.id }}"
          echo "Upstream workflow name: ${{ github.event.workflow_run.name }}"
          echo "Upstream workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo
          echo "variant.txt:"
          cat metadata/variant.txt || echo "(missing)"
          echo
          echo "version.txt:"
          cat metadata/version.txt || echo "(missing)"
          echo "======================"

      - name: Detect variant
        id: detect
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi
          
          VARIANT="$(cat metadata/variant.txt)"
          echo "VARIANT=$VARIANT" >> "$GITHUB_ENV"
          
          if [[ "$VARIANT" == canary* ]]; then
            echo "IS_CANARY=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_CANARY=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Tag and Release eligibility
        if: ${{ steps.detect.outputs.IS_CANARY == 'true' }}
        run: |
          echo "Canary variant detected. Skipping tagging and release creations."

      - name: Import GPG key
        if: ${{ steps.detect.outputs.IS_CANARY != 'true' }}
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Push tag and upload/update release
        if: ${{ steps.detect.outputs.IS_CANARY != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"

          VERSION="$(cat metadata/version.txt)"

          case "$VARIANT" in
            stable)
              RELEASE_TAG="v${VERSION}"
              ;;
            stable-quic)
              RELEASE_TAG="v${VERSION}"
              ;;
            *)
              echo "Unknown or unhandled variant: $VARIANT" >&2
              exit 1
              ;;
          esac

          git fetch --tags --quiet

          if ! git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

          BRANCH_NAME="${VERSION}"

          if ! git rev-parse --verify "origin/${BRANCH_NAME}" >/dev/null 2>&1; then
            git checkout -b "${BRANCH_NAME}" "${RELEASE_TAG}"
            git push --set-upstream origin "${BRANCH_NAME}"
          fi

          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"

          CURRENT="$(git log "${PREV_TAG}..${RELEASE_TAG}" --format="%aN|%aE" | sort -u || true)"
          ALL_PREVIOUS="$(git log --format="%aN|%aE" "${PREV_TAG}" --all | sort -u || true)"

          FILTERED_CURRENT="$(printf '%s\n' "$CURRENT" | while IFS='|' read -r NAME EMAIL; do
            LOWER="$(printf '%s' "$NAME" | tr '[:upper:]' '[:lower:]')"
            case "$LOWER" in
              *github-actions*|*madnuttah-bot*|*dependabot*)
                continue
                ;;
            esac
            printf '%s|%s\n' "$NAME" "$EMAIL"
          done)"

          NEW_CONTRIB="$(printf '%s\n' "$FILTERED_CURRENT" | while IFS='|' read -r NAME EMAIL; do
            if ! printf '%s\n' "$ALL_PREVIOUS" | grep -q "|$EMAIL$"; then
              printf '%s|%s\n' "$NAME" "$EMAIL"
            fi
          done)"

          NEW_CONTRIB_SECTION=""
          if [ -n "$NEW_CONTRIB" ]; then
            NEW_CONTRIB_MD="$(printf '%s\n' "$NEW_CONTRIB" | while IFS='|' read -r NAME EMAIL; do
              printf -- "- %s\n" "$NAME"
            done)"
            NEW_CONTRIB_SECTION="$(printf '## New contributors\n%s\n\n' "$NEW_CONTRIB_MD")"
          fi

          OPENSSL_VERSION="$(curl -fsSL https://raw.githubusercontent.com/madnuttah/openssl-buildenv/refs/heads/main/versions/openssl-buildenv.txt)"
          OPENSSL_QUIC_VERSION="$(curl -fsSL https://raw.githubusercontent.com/madnuttah/openssl-buildenv/refs/heads/main/versions/openssl-quic-buildenv.txt)"
          UNBOUND_CHANGELOG="https://github.com/NLnetLabs/unbound/releases/tag/release-${VERSION}"

          rm -f RELEASE_NOTES.md
          touch RELEASE_NOTES.md

          {
            printf "%s\n" "${VERSION}"

            if [[ "$VARIANT" == "stable-quic" ]]; then
              printf "Unbound QUIC\n\n"
            else
              printf "Unbound\n\n"
            fi

            printf "What's new:\n\n"

            printf "Unbound %s\n" "${VERSION}"
            printf "Release notes:\n"
            printf "%s\n\n" "${UNBOUND_CHANGELOG}"

            if [ "${OPENSSL_VERSION}" != "${PREV_TAG}" ]; then
              printf "OpenSSL Buildenv %s\n" "${OPENSSL_VERSION}"
              printf "Release notes:\n"
              printf "https://github.com/madnuttah/openssl-buildenv/releases/tag/v%s\n\n" "${OPENSSL_VERSION}"
            fi

            if [ "${OPENSSL_QUIC_VERSION}" != "${PREV_TAG}" ]; then
              printf "OpenSSL QUIC Buildenv %s\n" "${OPENSSL_QUIC_VERSION}"
              printf "Release notes:\n"
              printf "https://github.com/madnuttah/openssl-buildenv/releases/tag/v%s\n\n" "${OPENSSL_QUIC_VERSION}"
            fi

            printf "%s" "${NEW_CONTRIB_SECTION}"
          } >> RELEASE_NOTES.md

          gh release create "v${VERSION}" \
            -t "${VERSION}" \
            -F RELEASE_NOTES.md \
            --latest
