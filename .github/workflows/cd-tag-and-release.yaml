name: CD Tag And Release

on:
  workflow_run:
    workflows: [CD Testdrive Unbound Images]
    types:
      - completed

permissions: {}

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.repository.full_name == 'madnuttah/unbound-docker' &&
        startsWith(github.event.workflow_run.head_ref, 'refs/tags/v') &&
        !contains(github.event.workflow_run.head_ref, '-quic') }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}

          UNBOUND_VERSION="$(grep '^UNBOUND_VERSION=' buildvars | cut -d'=' -f2-)"
          UNBOUND_DOCKER_VERSION="$UNBOUND_VERSION-0"
          RELEASE_TAG="v$UNBOUND_DOCKER_VERSION"

          git fetch --all --tags
          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            exit 1
          fi

          WORKFLOW_ID=$(gh api repos/${GITHUB_REPOSITORY}/actions/workflows --jq '.workflows[] | select(.name=="CD Build Distroless Unbound Docker QUIC Image") | .id' || true)
          if [ -n "$WORKFLOW_ID" ]; then
            QUIC_RUN_CONCLUSION=$(gh api repos/${GITHUB_REPOSITORY}/actions/workflows/$WORKFLOW_ID/runs --jq '.workflow_runs[0].conclusion' || true)
          else
            QUIC_RUN_CONCLUSION=""
          fi

          if [ "$QUIC_RUN_CONCLUSION" = "success" ]; then
            WHATS_NEW=$(printf "* Updated Unbound and Unbound+QUIC to version %s\n\n" "$UNBOUND_VERSION")
          else
            WHATS_NEW=$(printf "* Updated Unbound to version %s\n* Unbound+QUIC build failed or was not available for this release\n\n" "$UNBOUND_VERSION")
          fi

          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push -u origin "$RELEASE_TAG"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$RELEASE_TAG$" | head -n 1)

          CURRENT=$(git log "$PREV_TAG..$RELEASE_TAG" --format="%aN|%aE" | sort -u || true)
          ALL_PREVIOUS=$(git log --format="%aN|%aE" "$PREV_TAG" --all | sort -u || true)

          FILTERED_CURRENT=$(echo "$CURRENT" | while IFS='|' read -r NAME EMAIL; do
            LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
            if echo "$LOWER" | grep -Eq "github-actions|madnuttah-bot|dependabot"; then
              continue
            fi
            echo "$NAME|$EMAIL"
          done)

          NEW_CONTRIB=$(echo "$FILTERED_CURRENT" | while IFS='|' read -r NAME EMAIL; do
            if ! echo "$ALL_PREVIOUS" | grep -q "|$EMAIL$"; then
              echo "$NAME|$EMAIL"
            fi
          done)

          CONTRIB_MD=$(echo "$FILTERED_CURRENT" | while IFS='|' read -r NAME EMAIL; do
            USER=$(curl -s "https://api.github.com/search/users?q=$EMAIL" | jq -r '.items[0].login // empty')
            if [ -n "$USER" ]; then
              echo "- @$USER"
            else
              echo "- $NAME"
            fi
          done)

          NEW_MD=$(echo "$NEW_CONTRIB" | while IFS='|' read -r NAME EMAIL; do
            USER=$(curl -s "https://api.github.com/search/users?q=$EMAIL" | jq -r '.items[0].login // empty')
            if [ -n "$USER" ]; then
              echo "- @$USER"
            else
              echo "- $NAME"
            fi
          done)

          if [ -z "$NEW_MD" ]; then
            NEW_MD="- None"
          fi

          RELEASE_NOTE=$(printf "## %s <madnuttah-bot>\n\n## What's new?\n%s## Contributors\n%s\n\n## New contributors\n%s\n\n## NLnet Labs Unbound changelog\nhttps://github.com/NLnetLabs/unbound/releases/tag/release-%s\n" \
            "$(date '+%Y-%m-%d')" "$WHATS_NEW" "$CONTRIB_MD" "$NEW_MD" "$UNBOUND_VERSION")

          git checkout -b "$UNBOUND_DOCKER_VERSION" "$RELEASE_TAG"
          git push --set-upstream origin "$UNBOUND_DOCKER_VERSION"

          gh release create "$RELEASE_TAG" -t "$UNBOUND_DOCKER_VERSION" -n "$RELEASE_NOTE" --latest
          exit 0
