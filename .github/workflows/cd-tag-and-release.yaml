name: CD Tag And Release

on:
  workflow_run:
    workflows: [CD Build Distroless Unbound Docker Image]
    types:
      - completed

permissions: {}

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.repository.full_name == 'madnuttah/unbound-docker' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5

      - name: Push tag and upload release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          IMAGE_BUILD_DATE="$(grep '^IMAGE_BUILD_DATE=' buildvars | cut -d'=' -f2-)"
          UNBOUND_VERSION="$(grep '^UNBOUND_VERSION=' buildvars | cut -d'=' -f2-)"
          UNBOUND_DOCKER_VERSION="${UNBOUND_VERSION}-0"
          TAG="v${UNBOUND_DOCKER_VERSION}"

          git fetch --prune origin --tags
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1)

          echo "## ${TAG} — $(date -u +"%Y-%m-%d")" > CHANGELOG_TMP
          echo "" >> CHANGELOG_TMP

          echo "### Updated components" >> CHANGELOG_TMP
          echo "* Updated Unbound to version ${UNBOUND_VERSION}" >> CHANGELOG_TMP
          echo "" >> CHANGELOG_TMP

          echo "### Commits" >> CHANGELOG_TMP
          git log "${PREV_TAG}..${TAG}" --oneline >> CHANGELOG_TMP
          echo "" >> CHANGELOG_TMP

          echo "### Contributors" >> CHANGELOG_TMP
          git log "${PREV_TAG}..${TAG}" --format="%aN|%aE" \
            | sort -u \
            | while IFS='|' read -r NAME EMAIL; do
                LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
                if echo "$LOWER" | grep -Eq "bot|github-actions"; then
                  continue
                fi
                USER=$(curl -s "https://api.github.com/search/users?q=${EMAIL}" \
                  | jq -r '.items[0].login // empty')
                if [ -n "$USER" ]; then
                  echo "- @${USER}" >> CHANGELOG_TMP
                else
                  echo "- ${NAME}" >> CHANGELOG_TMP
                fi
              done
          echo "" >> CHANGELOG_TMP

          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md >> CHANGELOG_TMP
          fi
          mv CHANGELOG_TMP CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "Update changelog for ${TAG}" || true
          git push

          gh release create "${TAG}" \
            -t "${TAG}" \
            -F CHANGELOG.md \
            --latest || \
          gh release edit "${TAG}" \
            -t "${TAG}" \
            -F CHANGELOG.md
