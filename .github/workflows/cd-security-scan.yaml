name: Security Scan

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 CET
  workflow_dispatch:

permissions: {}

env:
  DOCKERHUB_SLUG: "madnuttah/unbound"

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - latest
          - latest-quic
          - canary
          - canary-quic

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.dso.docker.com:443
            api.github.com:443
            auth.docker.io:443
            check.trivy.dev:443
            hub.docker.com:443
            index.docker.io:443
            mirror.gcr.io:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$DOCKERHUB_SLUG:${{ matrix.tag }}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.DOCKERHUB_SLUG }}:${{ matrix.tag }}
          exit-code: "1"
          ignore-unfixed: false
          scan-type: image
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          format: "table"

      - name: Docker Scout CVEs
        uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a
        with:
          command: cves
          image: ${{ env.DOCKERHUB_SLUG }}:${{ matrix.tag }}
          only-fixed: true
          only-severities: critical,high
          write-comment: false
          exit-code: false
