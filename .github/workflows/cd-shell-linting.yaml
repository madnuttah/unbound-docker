name: Lint shell scripts with shellcheck

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install latest ShellCheck (supports SARIF)
        run: |
          SC_VERSION="stable"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${SC_VERSION}/shellcheck-${SC_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo mv "shellcheck-${SC_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Install .NET SDK (required for SARIF Multitool)
        run: |
          sudo apt-get update
          sudo apt-get install -y dotnet-sdk-8.0

      - name: Install SARIF Multitool
        run: |
          dotnet tool install --global Sarif.Multitool

      - name: Add dotnet tools to PATH
        run: |
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Run shellcheck and generate JSON
        run: |
          shopt -s globstar
          shellcheck -f json **/*.sh > shellcheck.json || true

      - name: Convert JSON to SARIF
        run: |
          sarif-multitool convert shellcheck.json --output shellcheck.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          sarif_file: shellcheck.sarif
