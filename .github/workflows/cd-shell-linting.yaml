name: Lint shell scripts with shellcheck

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install latest ShellCheck (supports SARIF)
        run: |
          SC_VERSION="stable"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${SC_VERSION}/shellcheck-${SC_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo mv "shellcheck-${SC_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Install SARIF Multitool
        run: |
          wget -q https://github.com/microsoft/sarif-sdk/releases/latest/download/sarif-multitool-linux-x64.zip
          unzip -q sarif-multitool-linux-x64.zip -d sarif-tools
          sudo mv sarif-tools/sarif-multitool /usr/local/bin/sarif-multitool

      - name: Run shellcheck and generate JSON
        run: |
          shopt -s globstar
          shellcheck -f json **/*.sh > shellcheck.json

      - name: Convert JSON to SARIF
        run: |
          sarif-multitool convert shellcheck.json --output shellcheck.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: shellcheck.sarif
