name: Lint shell scripts with shellcheck

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download shellcheck
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            osvariant="darwin"
          else
            osvariant="linux"
          fi
          baseurl="https://github.com/koalaman/shellcheck/releases/download"
          curl -Lso sc.tar.xz "${baseurl}/stable/shellcheck-stable.${osvariant}.x86_64.tar.xz"
          tar -xf sc.tar.xz
          mv shellcheck-stable/shellcheck shellcheck
          ./shellcheck --version

      - name: Gather excluded paths
        id: exclude
        run: |
          declare -a excludes
          set -f
          excludes+=("! -path *./.git/*")
          excludes+=("! -path *.go")
          excludes+=("! -path */mvnw")
          echo "excludes=${excludes[@]}" >> "$GITHUB_OUTPUT"
          set +f

      - name: Gather additional files
        id: additional
        run: |
          echo "files=" >> "$GITHUB_OUTPUT"

      - name: Discover files
        id: discover
        env:
          INPUT_EXCLUDE_ARGS: ${{ steps.exclude.outputs.excludes }}
          INPUT_ADDITIONAL_FILE_ARGS: ${{ steps.additional.outputs.files }}
        run: |
          declare -a filepaths
          shebangregex="^#! */[^ ]*/(env *)?[abk]*sh"
          set -f
          while IFS= read -r -d '' file; do
            filepaths+=("$file")
          done < <(find "." \
              ${INPUT_EXCLUDE_ARGS} \
              -type f \
              '(' \
              -name '*.bash' \
              -o -name '.bashrc' \
              -o -name 'bashrc' \
              -o -name '.bash_aliases' \
              -o -name '.bash_completion' \
              -o -name '.bash_login' \
              -o -name '.bash_logout' \
              -o -name '.bash_profile' \
              -o -name 'bash_profile' \
              -o -name '*.ksh' \
              -o -name 'suid_profile' \
              -o -name '*.zsh' \
              -o -name '.zlogin' \
              -o -name 'zlogin' \
              -o -name '.zlogout' \
              -o -name 'zlogout' \
              -o -name '.zprofile' \
              -o -name 'zprofile' \
              -o -name '.zsenv' \
              -o -name 'zsenv' \
              -o -name '.zshrc' \
              -o -name 'zshrc' \
              -o -name '*.sh' \
              -o -path '*/.profile' \
              -o -path '*/profile' \
              -o -name '*.shlib' \
              ${INPUT_ADDITIONAL_FILE_ARGS} \
              ')' \
              -print0)
          while IFS= read -r -d '' file; do
            head -n1 "$file" | grep -Eqs "$shebangregex" || continue
            filepaths+=("$file")
          done < <(find "." \
              ${INPUT_EXCLUDE_ARGS} \
              -type f ! -name '*.*' -perm /111 \
              -print0)
          printf "%s\n" "${filepaths[@]}" > files.txt
          echo "filepaths=${filepaths[@]}" >> "$GITHUB_OUTPUT"
          set +f

      - name: Run shellcheck (SARIF)
        run: |
          ./shellcheck --format=sarif $(cat files.txt) > shellcheck.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          sarif_file: shellcheck.sarif
