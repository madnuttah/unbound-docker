name: CD Build Canary-QUIC Distroless Unbound Docker Image

on:
  schedule:
    - cron: "0 21 * * mon-fri"

permissions: {}

jobs:

  check_update:
    runs-on: ubuntu-latest
    outputs:
      UPDATE_FOUND: ${{ steps.IS_UPDATE_AVAILABLE.outputs.UPDATE_FOUND }}
      UNBOUND_GIT_SHA: ${{ steps.IS_UPDATE_AVAILABLE.outputs.UNBOUND_GIT_SHA }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Is update available
        id: IS_UPDATE_AVAILABLE
        run: |
          UNBOUND_GIT_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git | head -1 | cut -f 1)"
          CURRENT_SHA="$(cat unbound_git_sha)"
          if [[ "$CURRENT_SHA" = "$UNBOUND_GIT_SHA" ]]; then
            echo "UPDATE_FOUND=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "UPDATE_FOUND=true" >> $GITHUB_OUTPUT
            echo "UNBOUND_GIT_SHA=$UNBOUND_GIT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Import GPG key
        if: steps.IS_UPDATE_AVAILABLE.outputs.UPDATE_FOUND == 'true'
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5

      - name: Push updated unbound_git_sha
        if: steps.IS_UPDATE_AVAILABLE.outputs.UPDATE_FOUND == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.BOT_GITHUB_TOKEN }}@github.com/${{ github.repository }}
          echo "${{ steps.IS_UPDATE_AVAILABLE.outputs.UNBOUND_GIT_SHA }}" > unbound_git_sha
          git add unbound_git_sha
          git commit -m "Updated unbound_git_sha"
          git push origin main


  buildvars:
    needs: check_update
    if: needs.check_update.outputs.UPDATE_FOUND == 'true'
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: ${{ steps.SET_BUILDVARS.outputs.IMAGE_BUILD_DATE }}
      UNBOUND_VERSION: ${{ steps.SET_BUILDVARS.outputs.UNBOUND_VERSION }}
      UNBOUND_SHA256: ${{ steps.SET_BUILDVARS.outputs.UNBOUND_SHA256 }}
      OPENSSL_QUIC_BUILDENV_VERSION: ${{ steps.SET_BUILDVARS.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set buildvars
        id: SET_BUILDVARS
        run: |
          echo IMAGE_BUILD_DATE=$(date -u) >> $GITHUB_OUTPUT
          echo UNBOUND_VERSION="$(curl -s https://raw.githubusercontent.com/NLnetLabs/unbound/master/configure | awk -F= '/^version=/ { print $2 }')" >> $GITHUB_OUTPUT
          cat buildvars | grep UNBOUND_SHA256 >> $GITHUB_OUTPUT
          RELEASES=$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases | jq -r '.[].tag_name')
          OPENSSL_TAG=$(echo "$RELEASES" | grep -i quic | head -n 1)
          if [ -z "$OPENSSL_TAG" ]; then
            exit 1
          fi
          echo OPENSSL_QUIC_BUILDENV_VERSION="$OPENSSL_TAG" >> $GITHUB_OUTPUT


  build:
    needs: buildvars
    runs-on: ubuntu-22.04

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound"
      UNBOUND_DOCKER_IMAGE_VERSION: "canary-quic"

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          platforms: linux/386,linux/arm/v6,linux/arm/v7,linux/arm64,linux/amd64
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            DOCKERHUB_SLUG=${{ env.DOCKERHUB_SLUG }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ env.UNBOUND_DOCKER_IMAGE_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}
          file: ./unbound/canary_quic.Dockerfile
          push: true
          sbom: true
          provenance: true
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ env.UNBOUND_DOCKER_IMAGE_VERSION }}
