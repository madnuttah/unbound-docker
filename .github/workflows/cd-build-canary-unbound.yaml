name: CD Build Canary Unbound Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "versions/unbound-git-sha.txt"

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:

  buildvars:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      OPENSSL_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            nlnetlabs.nl:443
            raw.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0
          
      - name: Set buildvars
        id: vars
        run: |
          set -euo pipefail

          IMAGE_BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "IMAGE_BUILD_DATE=$IMAGE_BUILD_DATE" >> "$GITHUB_OUTPUT"

          UNBOUND_VERSION="$(
            curl -fsSL https://raw.githubusercontent.com/NLnetLabs/unbound/master/configure \
            | awk -F= '/^version=/ { print $2 }'
          )"
          echo "UNBOUND_VERSION=$UNBOUND_VERSION" >> "$GITHUB_OUTPUT"

          RESP="$(curl -fsSL https://api.github.com/repos/madnuttah/openssl-buildenv/releases)"
          echo "$RESP" | jq empty

          OPENSSL_BUILDENV_VERSION="$(
            echo "$RESP" |
            jq -r '
              map(select(.prerelease == false and (.name | endswith("-quic") | not)))
              | first
              | .name
            '
          )"

          echo "OPENSSL_BUILDENV_VERSION=$OPENSSL_BUILDENV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show build variables
        run: |
          echo "IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
          echo "UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}"
          echo "OPENSSL_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"

  build:
    needs: buildvars
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: 386
            platform: linux/386
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x
          - arch: riscv64
            platform: linux/riscv64
    
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            dl-cdn.alpinelinux.org:443
            github.com:443
            keyserver.ubuntu.com:443
            pgp.surf.nl:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443
            www.internic.net:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: ./unbound/canary.Dockerfile

          platforms: ${{ matrix.platform }}
          push: true

          sbom: false
          provenance: false

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
          tags: |
            ${{ env.DOCKERHUB_SLUG }}:canary-${{ matrix.arch }}

  upload-pipeline-metadata:
    needs: [buildvars, build]
    runs-on: ubuntu-latest
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >+
      
      - name: Create Isolated Metadata
        run: |
          mkdir -p metadata-payload
          printf "%s" "${{ needs.buildvars.outputs.UNBOUND_VERSION }}" > metadata-payload/version.txt
          printf "canary" > metadata-payload/variant.txt

      - name: Upload Metadata Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unbound-build-metadata
          path: metadata-payload/
          retention-days: 1
