name: CD Build Canary Distroless Unbound QUIC Docker Image

on:
  workflow_run:
    workflows: ["CD Build Canary Distroless Unbound Docker Image"]
    types:
      - completed
  workflow_dispatch:

permissions: {}

jobs:

  check-update:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Confirm upstream workflow success
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
              echo "Upstream workflow did not succeed"
              exit 1
            fi
          fi
          echo "Update triggered"


  build:
    needs: check-update
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound"
      GHCR_SLUG: "ghcr.io/madnuttah/unbound"
      UNBOUND_DOCKER_IMAGE_VERSION: "canary-quic"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set buildvars
        id: vars
        run: |
          echo IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") >> $GITHUB_OUTPUT
          source buildvars
          echo UNBOUND_VERSION="$UNBOUND_VERSION" >> $GITHUB_OUTPUT
          echo OPENSSL_QUIC_BUILDENV_VERSION="$OPENSSL_QUIC_BUILDENV_VERSION" >> $GITHUB_OUTPUT
          echo NGTCP2_VERSION="$NGTCP2_VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to Dockerhub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

#      - name: Login to GHCR
#        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
#        with:
#          registry: ghcr.io
#          username: ${{ github.actor }}
#          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: |
            ${{ env.DOCKERHUB_SLUG }}
            ${{ env.GHCR_SLUG }}
          tags: |
            type=raw,value=${{ env.UNBOUND_DOCKER_IMAGE_VERSION }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v6,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64
          builder: ${{ steps.buildx.outputs.name }}
          build-args: |
            OPENSSL_QUIC_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}
            NGTCP2_VERSION=${{ steps.vars.outputs.NGTCP2_VERSION }}
            IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}
          file: ./unbound/canary_quic.Dockerfile
          push: true
          sbom: true
          provenance: true

          cache-from: |
            type=registry,ref=madnuttah/unbound:buildcache-canary-quic
 #           type=registry,ref=ghcr.io/madnuttah/unbound:buildcache-canary-quic
          cache-to: |
            type=registry,ref=madnuttah/unbound:buildcache-canary-quic,mode=max
 #           type=registry,ref=ghcr.io/madnuttah/unbound:buildcache-canary-quic,mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:canary-quic
  #          ${{ env.GHCR_SLUG }}:canary-quic

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        if: ${{ github.event_name != 'pull_request' }}
        with:
          image-ref: ${{ env.DOCKERHUB_SLUG }}:canary-quic
          exit-code: "1"
          ignore-unfixed: false
          scan-type: image
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          format: "table"

      - name: Docker Scout CVEs
        uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a
        if: ${{ github.event_name != 'pull_request' }}
        with:
          command: cves
          image: ${{ env.DOCKERHUB_SLUG }}:canary-quic
          only-fixed: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exit-code: false
