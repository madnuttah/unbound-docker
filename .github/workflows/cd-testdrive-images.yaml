name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443

      - name: Download metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: unbound-build-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: metadata

      - name: Ensure metadata exists
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi
          
      - name: Show metadata used for this run
        run: |
          set -euo pipefail

          RUN_ID="${{ github.event.workflow_run.id }}"
          RUN_NAME="${{ github.event.workflow_run.name }}"
          RUN_CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          echo "=== METADATA ==="
          printf 'Triggered by workflow run: %s\n' "${RUN_ID}"
          printf 'Upstream workflow name: %s\n' "${RUN_NAME}"
          printf 'Upstream workflow conclusion: %s\n' "${RUN_CONCLUSION}"
          echo
          echo "variant.txt:"
          cat metadata/variant.txt || echo "(missing)"
          echo
          echo "version.txt:"
          cat metadata/version.txt || echo "(missing)"
          echo "================="

      - name: Read variant from metadata
        run: |
          set -euo pipefail
          VARIANT="$(tr -d '\n\r' < metadata/variant.txt)"

          case "${VARIANT}" in
            stable|stable-quic|canary|canary-quic)
              {
                echo "VARIANT<<EOF"
                printf '%s\n' "${VARIANT}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Invalid variant metadata value: ${VARIANT}" >&2
              exit 1
              ;;
          esac

      - name: Read version from metadata
        run: |
          set -euo pipefail

          if [ ! -f metadata/version.txt ]; then
            echo "Missing version metadata file." >&2
            exit 1
          fi

          VERSION="$(tr -d '\n\r' < metadata/version.txt)"
          {
            echo "VERSION<<EOF"
            printf '%s\n' "${VERSION}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Determine image tag
        run: |
          case "$VARIANT" in
            stable)
              {
                echo "IMAGE_TAG<<EOF"
                echo "madnuttah/unbound:latest"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            stable-quic)
              {
                echo "IMAGE_TAG<<EOF"
                echo "madnuttah/unbound:latest-quic"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            canary)
              {
                echo "IMAGE_TAG<<EOF"
                echo "madnuttah/unbound:canary"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            canary-quic)
              {
                echo "IMAGE_TAG<<EOF"
                echo "madnuttah/unbound:canary-quic"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown variant: $VARIANT"
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi

      - name: Wait for Unbound readiness
        run: |
          for _ in {1..20}; do
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          timeout 10s docker exec unbound-dns drill cloudflare.com A || true

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true

      - name: Re-upload metadata for Publish Workflow
        run: |
          set -euo pipefail
          mkdir -p metadata-payload
          printf "%s" "$VARIANT" > metadata-payload/variant.txt
          printf "%s" "$VERSION" > metadata-payload/version.txt

      - name: Upload metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unbound-build-metadata
          path: metadata-payload/
          retention-days: 1
