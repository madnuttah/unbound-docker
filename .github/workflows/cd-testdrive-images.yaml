name: CD Testdrive Unbound Images

on:
  workflow_run:
    workflows:
      - "CD Build Canary Unbound Docker Image"
      - "CD Build Canary-QUIC Distroless Unbound Docker Image"
      - "CD Build Distroless Unbound Docker Image"
    types:
      - completed

jobs:
  test-image:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Extract image tag from triggering workflow
        run: |
          echo "IMAGE_TAG=${{ github.event.workflow_run.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG"

      - name: Test Unbound config
        run: docker run --rm "$IMAGE_TAG" unbound-checkconf

      - name: DNS test
        run: |
          docker run -d --name unbound-dns -p 5353:53/udp "$IMAGE_TAG"
          sleep 4
          dig @127.0.0.1 -p 5353 cloudflare.com A || true
          docker rm -f unbound-dns

      - name: DNSSEC validation test
        run: |
          docker run -d --name unbound-dnssec -p 5353:53/udp "$IMAGE_TAG"
          sleep 4

          dig @127.0.0.1 -p 5353 dnssec-failed.org A +dnssec +adflag > dnssec_fail.out || true
          if ! grep -q "status: SERVFAIL" dnssec_fail.out; then
            docker rm -f unbound-dnssec
            exit 1
          fi

          dig @127.0.0.1 -p 5353 cloudflare.com A +dnssec +adflag > dnssec_ok.out || true
          if ! grep -q "ad;" dnssec_ok.out; then
            docker rm -f unbound-dnssec
            exit 1
          fi

          docker rm -f unbound-dnssec
